<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420">
  <style>
    .box { fill:#f8fafc; stroke:#2b6cb0; stroke-width:2; rx:8; ry:8; font:16px sans-serif; }
    .small { font:13px sans-serif; fill:#2d3748; }
    .arrow { stroke:#2d3748; stroke-width:2; fill:none; marker-end:url(#arrowhead); }
    .highlight { fill:#fff7ed; stroke:#c05621; stroke-width:2; rx:8; ry:8; }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2d3748"/>
    </marker>
  </defs>

  <!-- Nodes -->
  <g transform="translate(40,40)">
    <rect x="0" y="0" width="180" height="70" class="box"/>
    <text x="90" y="38" text-anchor="middle" class="small">1. Dataset & Preproc</text>

    <rect x="230" y="0" width="200" height="70" class="box"/>
    <text x="330" y="38" text-anchor="middle" class="small">2. Model Init (Xavier/He)</text>

    <rect x="520" y="0" width="200" height="70" class="box"/>
    <text x="620" y="24" text-anchor="middle" class="small">3. Training Loop</text>
    <text x="620" y="44" text-anchor="middle" class="small">(forward → backward → update)</text>

    <rect x="230" y="140" width="210" height="70" class="box"/>
    <text x="335" y="175" text-anchor="middle" class="small">4. Monitor Gradients</text>

    <rect x="520" y="140" width="220" height="70" class="highlight"/>
    <text x="630" y="170" text-anchor="middle" class="small" fill="#c05621">5. Apply VGP Technique</text>
    <text x="630" y="190" text-anchor="middle" class="small" fill="#c05621">(BN / Activation / Skip / LR adjust)</text>

    <rect x="780" y="70" width="170" height="70" class="box"/>
    <text x="865" y="105" text-anchor="middle" class="small">6. Evaluation & Plots</text>

    <rect x="520" y="280" width="430" height="70" class="box"/>
    <text x="735" y="315" text-anchor="middle" class="small">7. Compare: with / without VGP → conclusions</text>
  </g>

  <!-- Arrows -->
  <g transform="translate(40,40)">
    <path class="arrow" d="M180 35 L230 35"/>
    <path class="arrow" d="M430 35 L520 35"/>
    <path class="arrow" d="M720 35 L780 35"/>

    <path class="arrow" d="M330 70 L330 140"/>
    <path class="arrow" d="M620 70 L620 140"/>

    <path class="arrow" d="M650 210 L780 105"/>
    <path class="arrow" d="M740 210 L740 280"/>
  </g>

  <!-- Footer note -->
  <text x="20" y="405" class="small">Workflow: data → model init → training; monitoring flags vanishing-gradients → VGP applied mid-training → evaluation and comparison.</text>
</svg>
